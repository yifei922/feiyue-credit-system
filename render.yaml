# Render 免费层一键部署（无需自有服务器 / 无需域名，自动分配 *.onrender.com 子域名）
# 步骤：
#   1) 把本仓库推送到你的 GitHub
#   2) Render 控制台 -> New -> Web Service -> 关联仓库 -> 选 "Use render.yaml"
#   3) 免费层会自动构建前端 + 启动 Node 后端，分配公网网址
services:
  - type: web
    name: feiyue-credit
    runtime: node
    plan: free
    # node:sqlite 内置模块需要 Node >= 22.5.0
    # Render 默认可能用旧版本，必须显式指定
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
    buildCommand: |
      cd frontend && npm install && npm run build:server && cd ../server && npm install
    startCommand: cd server && npm start
    healthCheckPath: /
