# Render 免费层一键部署（Blueprint 模式）
services:
  - type: web
    name: feiyue-credit
    runtime: node
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
    # 从仓库根目录执行：构建前端 + 安装后端依赖
    buildCommand: cd frontend && npm install --include=dev && npx vite build --mode server && cd ../server && npm install
    # 启动服务（从仓库根目录，进入 server 目录）
    startCommand: cd server && node src/index.js
    healthCheckPath: /
