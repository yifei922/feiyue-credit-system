# Render 部署配置（Blueprint 模式）
# 冷启动优化：免费层 15min 无请求自动休眠，详见 docs/KEEP-ALIVE.md
services:
  - type: web
    name: feiyue-credit
    runtime: node
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
    # 构建前端 + 安装后端依赖
    buildCommand: cd frontend && npm install --include=dev && npx vite build --mode server && cd ../server && npm install
    # 启动服务
    startCommand: cd server && node src/index.js
    # 健康检查：Express 在监听端口后立即响应，加速 Render 判定"已就绪"
    healthCheckPath: /api/health
    # 单实例（免费层上限）
    numInstances: 1
