# Render 免费层一键部署
# 用法: Render 控制台 -> New -> Blueprint -> 连 GitHub 仓库 -> Deploy Blueprint
services:
  - type: web
    name: feiyue-credit
    runtime: node
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
    # 构建前端 + 安装后端依赖（单行命令，兼容所有 YAML 解析器）
    buildCommand: cd frontend && npm install && npm run build:server && cd ../server && npm install
    # 启动 Node 服务（单进程托管前端 dist + /api）
    startCommand: cd server && npm start
    healthCheckPath: /
